---
- name: Configure All Hosts (Base Setup)
  hosts: web_servers
  become: true
  roles:
    - base_setup

- name: Configure Backend Web Pages
  hosts: vm-2,vm-3
  become: true
  roles:
    - nginx_page

- name: Configure Frontend Proxy Server
  hosts: vm-1
  become: true
  roles:
    - nginx_proxy
